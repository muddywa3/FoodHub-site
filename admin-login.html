<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - FoodHub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">🍽️ FoodHub Admin</div>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="admin-section">
        <div class="container" style="max-width: 500px;">
            <div class="admin-form" style="margin-top: 3rem;">
                <h2>Admin Login</h2>
                <p>Enter the admin password to manage services and orders.</p>
                <form id="admin-login-form">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" required autofocus>
                    <button class="btn btn-primary" type="submit">Login</button>
                    <p id="login-error" style="color: #d93025; display: none; margin-top: 1rem;"></p>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 FoodHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="admin-login.js"></script>
</body>
</html>
